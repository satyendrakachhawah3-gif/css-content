<!doctype html>
<html lang="en">
  <head>
    <title>CSS Display Property</title>
    <style>
      /*This is a block element property*/
      .div-one {
        border: solid red 3px;
        margin: 30px;
        width: 300px;
        height: 300px;
        padding: 40px;
      }
      /*This is a boxsizing-border box*/
      .box {
        border: solid blue 3px;
        width: 500px;
        padding: 20px;
        box-sizing: border-box;
      }
       span{
          border: solid green 3px;
          height: 100px;
          width: 100px;
          margin: 50px;
          padding: 60px;
          display: block;
        }
        .span-one{
            display: inline-block;
            height: 300px;
            width: 250px;
            margin: 50px;
            padding: 60px;
        }
    </style>
  </head>
  <body>
    <div class="div-one">welcome to css display property</div>
    <div class="div-one">know we talk about display</div>
    <div class="box">
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Eum debitis ad
      sequi tenetur distinctio nam eveniet quasi sint error illum.
    </div>
    <span>I am Yash Thakur</span>
    <span>I am a associate engineer</span>
    <span class="span-one">i am Yash thakur2.0</span>
    <span class="span-one">i am mern  stack developper</span>

    </div>
  </body>
</html>
